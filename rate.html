<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quality Control - Breaking Buns</title>

    <style>
        /* IDENTICAL CORE STYLES FROM CONTACTS.HTML */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            animation: fadeInUp 0.50s ease-out;
            margin: 0;
            padding: 0;
            background-color: #093426;
            background-image: url('bgside.png');
            background-attachment: fixed;
            background-position: center top;
            background-size: cover;
        }

        header {
            background-image: url('burgerbackground.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding-top: 60px;
            padding-bottom: 80px; 
            text-align: center;
            box-shadow: inset 0 -140px 150px -80px #093426, inset 0 -40px 40px rgba(0, 0, 0, 0.5);
        }

        .logo-img {
            max-width: 100%;
            height: auto;
        }

        .navbar {
            animation: fadeInUp 1s ease-out both;
            animation-delay: 0.2s; 
            background-color: #F6B102;
            max-width: 750px;
            margin: -110px auto 0 auto;
            border: 2px solid #333;
            padding: 13px;
            border-radius: 50px;
            position: relative; 
            z-index: 10;
        }

        .navbar ul {
            list-style-type: none;
            justify-content: center;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 30px;
        }

        .navbar a {
            font-family: Copperplate, serif;
            font-size: 16px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            background-color: #093426;
            border-radius: 70px;
            padding: 8px 50px;
            border: 1px solid #333;
            transition: 0.3s;
            display: inline-block;
            box-shadow: 0 4px 1px rgba(0,0,0,0.3);
        }

        .navbar a:hover {
            background-color: #F7EDD4;
            color: #093426;
        }

        .main-content {
            max-width: 100%;
            backdrop-filter: blur(10px);
            margin: 0;
            background-color: rgba(9, 52, 38, 0.85);
            text-align: center;
            padding: 60px 20px;
            min-height: 600px;
        }

        .section-title-box {
            display: inline-block;
            background-color: #F6B102;
            color: #093426;
            font-family: 'Arial Black', Gadget, sans-serif;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 15px 60px;
            border-radius: 70px;
            border: 2px solid #333;
            box-shadow: 0 6px 0px rgba(0,0,0,0.4);
            margin-bottom: 50px;
        }

        /* --- YOUR SPECIFIC SURVEY BOX STYLES (INTEGRATED) --- */
        .container {
            max-width: 800px;
            width: 90%;
            margin: 0 auto 50px auto;
            background: #F7EDD4; /* Your Premium Cream */
            padding: 50px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            color: #093426;
            text-align: center;
            border-top: 8px solid #F6B102;
        }

        .form-group { width: 100%; margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; }
        label { display: block; margin-bottom: 10px; font-weight: 800; font-size: 13px; text-transform: uppercase; }

        input[type="text"], input[type="date"], input[type="time"], select {
            width: 100%; max-width: 600px; padding: 15px; border: 2px solid #ddd; border-radius: 12px;
            font-size: 16px; text-align: center; box-sizing: border-box; transition: 0.3s;
        }

        .input-grid, .radio-grid { 
            display: grid; gap: 20px; width: 100%; max-width: 600px; margin: 0 auto; 
        }
        .input-grid { grid-template-columns: 1fr 1fr; }
        .radio-grid { grid-template-columns: 1fr 1fr; max-width: 700px; }

        .radio-option {
            background: white; border: 2px solid #eee; padding: 15px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: 0.3s; font-size: 13px; font-weight: 600;
        }
        .radio-option:hover { border-color: #F6B102; }
        .radio-option input { margin-right: 12px; }

        /* THE GREEN BUTTON EFFECT FROM CONTACTS */
        .btn-submit {
            background-color: #093426;
            color: white;
            width: 80%;
            max-width: 300px;
            padding: 15px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-family: 'Arial Black', sans-serif;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-5px);
            background-color: #F6B102;
            color: #093426;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        .receipt-preview img {
            max-width: 250px; width: 100%; border-radius: 8px; margin-bottom: 20px;
        }

        footer {
  /* This creates a fade from the side burgers into the solid green footer */
  background: linear-gradient(to top, #093426 70%, rgba(9, 52, 38, 0) 100%);
  
  padding: 20px 1px 1px; /* More top padding makes the fade look longer and smoother */
  text-align: center;
  font-size: 0.9em;
  color: #F7EDD4;
  margin-top: 30px; /* Adds space after your Mission section before the footer starts */
  footer .social-links {
  margin-bottom: 20px;}
}

footer .social-links p {
  font-family: Georgia, serif;
  color: #F7EDD4;
}

footer .social-links a {
  color: #F6B102; /* Match your navbar yellow */
  text-decoration: none;
  margin: 0 10px;
  transition: 0.3s;
  font-weight: bold;
}

footer .social-links a:hover {
  color: white;
  text-shadow: 0 0 10px #F6B102;
}

/* This styles the actual icons */
footer i {
  font-size: 1.2rem;
  vertical-align: middle;
  margin-right: 5px;
}
    @media (max-width: 768px) {
      .navbar { max-width: 95%; margin-top: -50px; }
      .navbar ul { gap: 10px; }
      .navbar a { padding: 8px 15px; font-size: 14px; }
    }

    </style>
</head>
<body>

<header>
    <img src="breaking bad1.png" class="logo-img" alt="Breaking Buns Logo" width="500">
    <nav class="navbar">
        <ul>
            <li><a href="ictweb.html">Home</a></li>
            <li><a href="promos.html">Promos</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="contact.html">Contacts</a></li>
        </ul>
    </nav>
</header>

<main class="main-content">
    <h2 class="section-title-box">Quality Control</h2>

    <div class="container">
        <div class="receipt-preview">
            <label>Refer to your receipt:</label>
            <img src="recept.png" alt="Receipt Example">
        </div>

        <form>
            <div class="form-group">
                <label>Restaurant Number</label>
                <input type="text" placeholder="e.g. BB-505">
            </div>

            <div class="input-grid">
                <div class="form-group">
                    <label>Date of Visit</label>
                    <input type="date">
                </div>
                <div class="form-group">
                    <label>Time of Visit</label>
                    <input type="time">
                </div>
            </div>

            <div class="form-group">
                <label>How did you place the order?</label>
                <div class="radio-grid">
                    <label class="radio-option"><input type="radio" name="method"> KIOSK</label>
                    <label class="radio-option"><input type="radio" name="method"> FRONT COUNTER</label>
                    <label class="radio-option"><input type="radio" name="method"> MOBILE / TABLE</label>
                    <label class="radio-option"><input type="radio" name="method"> MOBILE PICK UP</label>
                    <label class="radio-option"><input type="radio" name="method"> PHONE ORDER</label>
                    <label class="radio-option"><input type="radio" name="method"> DRIVE THROUGH</label>
                    <label class="radio-option"><input type="radio" name="method"> DELIVERY PARTNER</label>
                    <label class="radio-option"><input type="radio" name="method"> BREAKING BUNS APP</label>
                </div>
            </div>

           <button type="button" id="submitBtn" class="btn-submit" onclick="processReport()">
    Submit Report
</button>
    </div>
</main>

<footer>
  <div class="social-links">
    <p>Follow us on our: 
      <a href="https://www.instagram.com" target="_blank" rel="noopener noreferrer"><i class="fab fa-instagram"></i> Instagram</a>, 
      <a href="https://www.facebook.com" target="_blank" rel="noopener noreferrer"><i class="fab fa-facebook"></i> Facebook</a>, 
      <a href="https://twitter.com" target="_blank" rel="noopener noreferrer"><i class="fab fa-x-twitter"></i> X</a>
    </p>
  </div>
  <p>&copy; 2026 Breaking Buns. All rights reserved.</p>
</footer>

   <script>
    function processReport() {
        const btn = document.getElementById('submitBtn');
        
        // 1. Change to "Approved" state
        btn.innerText = "SUBMIT APPROVED ✓";
        btn.style.backgroundColor = "#F7EDD4"; // Changes to the Cream color
        btn.style.color = "#093426";            // Dark Green text
        btn.style.pointerEvents = "none";       // Disable clicking during reset
        
        // 2. Wait 3 seconds, then reset
        setTimeout(() => {
            alert("Your data has been added to the system.");
            btn.innerText = "Submit Report";
            btn.style.backgroundColor = "#093426"; // Back to Dark Green
            btn.style.color = "white";              // Back to White text
            btn.style.pointerEvents = "auto";       // Enable clicking again
        }, 2000); // 3000 = 3 seconds
    }
</script>
</body>
</html>
